name: Bug report
description: Report a reproducible problem with react-chunked-upload.
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.2
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: 18.3.1
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected behavior and the actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link a repository or provide the smallest code sample that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system, backend framework, and relevant storage service.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
